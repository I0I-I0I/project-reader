services:
    web:
        image: ${DEPLOY_IMAGE:?Set DEPLOY_IMAGE to an immutable image digest}
        pull_policy: never
        restart: unless-stopped
        read_only: true
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        cap_add:
            - NET_BIND_SERVICE
        environment:
            PRODUCTION_HOST: ${PRODUCTION_HOST:-localhost}
        ports:
            - "127.0.0.1:8000:80"
        tmpfs:
            - /tmp:size=16m,mode=1777
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'wget --quiet -O /dev/null --header="Host: $${PRODUCTION_HOST}" http://127.0.0.1/health/version',
                ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s
        pids_limit: 128
        mem_limit: 256m
        cpus: 1.0
        stop_grace_period: 30s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
