services:
    app:
        build: .
        container_name: project-reader
        restart: always
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    caddy:
        image: caddy:2-alpine
        container_name: project-reader-caddy
        restart: always
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp" # Support HTTP/3 (QUIC)
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - app

volumes:
    caddy_data:
    caddy_config:
