services:
    web:
        image: ${DEPLOY_IMAGE:?Set DEPLOY_IMAGE to an immutable image digest}
        pull_policy: never
        restart: unless-stopped
        read_only: true
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        cap_add:
            - NET_BIND_SERVICE
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - caddy_data:/data
            - caddy_config:/config
        tmpfs:
            - /tmp:size=16m,mode=1777
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:2019/config/"]
            interval: 10s
            timeout: 5s
            retries: 6
            start_period: 10s
        stop_grace_period: 30s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

volumes:
    caddy_data:
    caddy_config:
