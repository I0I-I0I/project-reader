<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
    <head>
        <meta charset="utf-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Reader" />

        <meta
            id="theme-color-light"
            name="theme-color"
            content="#f5f0e1"
            media="(prefers-color-scheme: light)"
        />
        <meta
            id="theme-color-dark"
            name="theme-color"
            content="#000000"
            media="(prefers-color-scheme: dark)"
        />

        <meta name="text-scale" content="scale" />
        <link rel="icon" href="/favicon.ico?v=1" sizes="any" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=1" />
        <link rel="manifest" href="/site.webmanifest?v=1" />
        <script>
            ;(function () {
                try {
                    const savedSettings = JSON.parse(localStorage.getItem("settings") || "{}")
                    const theme = savedSettings.theme || localStorage.getItem("theme") || "system"
                    const animations = savedSettings.animations !== false
                    document.documentElement.dataset.motion = animations ? "on" : "off"
                    const dark =
                        theme === "dark" ||
                        (theme === "system" &&
                            window.matchMedia("(prefers-color-scheme: dark)").matches)
                    if (dark) {
                        document.documentElement.classList.remove("light")
                        document.documentElement.classList.add("dark")
                        document.documentElement.style.colorScheme = "dark"
                    } else {
                        document.documentElement.classList.add("light")
                        document.documentElement.classList.remove("dark")
                        document.documentElement.style.colorScheme = "light"
                    }
                } catch (e) {}
            })()
        </script>
        %sveltekit.head%
    </head>

    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
