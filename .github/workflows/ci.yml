name: CI

on:
    push:
        branches:
            - master
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    quality:
        name: Tests, checks, formatting, and linting
        runs-on: ubuntu-24.04
        timeout-minutes: 20

        steps:
            - name: Checkout code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  persist-credentials: false

            - name: Set up pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Set up Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run tests
              run: pnpm test

            - name: Run Svelte checks
              run: pnpm check

            - name: Build production bundle
              run: pnpm build

            - name: Check formatting
              run: pnpm exec oxfmt --check .

            - name: Run linter
              run: pnpm exec oxlint .

            - name: Install checksum-verified actionlint
              env:
                  ACTIONLINT_VERSION: 1.7.9
                  ACTIONLINT_SHA256: 233b280d05e100837f4af1433c7b40a5dcb306e3aa68fb4f17f8a7f45a7df7b4
              run: |
                  set -euo pipefail
                  archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
                  curl --fail --silent --show-error --location \
                    "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}" \
                    --output "/tmp/$archive"
                  echo "$ACTIONLINT_SHA256  /tmp/$archive" | sha256sum --check
                  tar -xzf "/tmp/$archive" -C /tmp actionlint
                  install -m 755 /tmp/actionlint /usr/local/bin/actionlint

            - name: Lint GitHub Actions workflows
              run: actionlint

    production-container:
        name: Production container check
        if: github.event_name == 'pull_request'
        needs: quality
        runs-on: ubuntu-24.04
        timeout-minutes: 20
        permissions:
            contents: read

        steps:
            - name: Checkout untrusted revision without credentials
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  persist-credentials: false

            - name: Build and smoke-test production container
              run: |
                  set -Eeuo pipefail
                  image_tag="project-reader-pr:$GITHUB_SHA"
                  container_id=""
                  # shellcheck disable=SC2317,SC2329 # Invoked by the EXIT trap.
                  cleanup() {
                    status=$?
                    if [[ -n "$container_id" && $status -ne 0 ]]; then
                      docker logs "$container_id" || true
                    fi
                    [[ -z "$container_id" ]] || docker rm --force "$container_id" >/dev/null 2>&1 || true
                    exit "$status"
                  }
                  trap cleanup EXIT

                  DOCKER_BUILDKIT=1 docker build \
                    --build-arg "RELEASE=$GITHUB_SHA" \
                    --tag "$image_tag" .
                  container_id="$(docker run --detach \
                    --env PRODUCTION_HOST=localhost \
                    --publish 127.0.0.1::80 "$image_tag")"
                  port="$(docker port "$container_id" 80/tcp | awk -F: 'NR == 1 { print $NF }')"

                  for _ in {1..30}; do
                    actual_release="$(curl --fail --silent --show-error \
                      --header 'Host: localhost' \
                      "http://127.0.0.1:$port/health/version" || true)"
                    [[ "$actual_release" == "$GITHUB_SHA" ]] && exit 0
                    sleep 1
                  done
                  echo "Image did not serve the expected revision" >&2
                  exit 1

    image:
        name: Build, test, and publish production image
        if: github.event_name == 'push'
        needs: quality
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        permissions:
            attestations: write
            contents: read
            id-token: write
            packages: write

        steps:
            - name: Checkout tested revision
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  persist-credentials: false

            - name: Set image name
              id: image
              run: |
                  set -euo pipefail
                  image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
                  echo "name=$image_name" >> "$GITHUB_OUTPUT"
                  echo "tag=$image_name:$GITHUB_SHA" >> "$GITHUB_OUTPUT"

            - name: Log in to GitHub Container Registry
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  printf '%s' "$GH_TOKEN" | docker login ghcr.io \
                    --username "$GITHUB_ACTOR" --password-stdin

            - name: Build production image once
              env:
                  IMAGE_TAG: ${{ steps.image.outputs.tag }}
              run: |
                  set -euo pipefail
                  DOCKER_BUILDKIT=1 docker build \
                    --build-arg "RELEASE=$GITHUB_SHA" \
                    --tag "$IMAGE_TAG" .

            - name: Smoke-test the exact image
              env:
                  IMAGE_TAG: ${{ steps.image.outputs.tag }}
              run: |
                  set -Eeuo pipefail
                  container_id="$(docker run --detach --env PRODUCTION_HOST=localhost \
                    --publish 127.0.0.1::80 "$IMAGE_TAG")"
                  # shellcheck disable=SC2317,SC2329 # Invoked by the EXIT trap.
                  cleanup() {
                    status=$?
                    [[ $status -eq 0 ]] || docker logs "$container_id" || true
                    docker rm --force "$container_id" >/dev/null 2>&1 || true
                    exit "$status"
                  }
                  trap cleanup EXIT
                  port="$(docker port "$container_id" 80/tcp | awk -F: 'NR == 1 { print $NF }')"

                  for _ in {1..30}; do
                    actual_release="$(curl --fail --silent --show-error \
                      --header 'Host: localhost' \
                      "http://127.0.0.1:$port/health/version" || true)"
                    [[ "$actual_release" == "$GITHUB_SHA" ]] && exit 0
                    sleep 1
                  done
                  echo "Image did not serve the expected revision" >&2
                  exit 1

            - name: Generate SPDX SBOM from the tested image
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  image: ${{ steps.image.outputs.tag }}
                  format: spdx-json
                  output-file: image.spdx.json
                  syft-version: v1.48.0
                  upload-artifact: false
                  upload-release-assets: false

            - name: Scan the tested image for fixable critical vulnerabilities
              uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
              with:
                  image-ref: ${{ steps.image.outputs.tag }}
                  format: json
                  output: trivy-results.json
                  exit-code: "1"
                  ignore-unfixed: true
                  severity: CRITICAL
                  version: v0.69.3

            - name: Upload supply-chain reports
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: image-security-reports
                  path: |
                      image.spdx.json
                      trivy-results.json
                  if-no-files-found: warn
                  retention-days: 7

            - name: Publish image by commit
              id: publish
              env:
                  IMAGE_NAME: ${{ steps.image.outputs.name }}
                  IMAGE_TAG: ${{ steps.image.outputs.tag }}
              run: |
                  set -euo pipefail
                  docker push "$IMAGE_TAG" | tee /tmp/docker-push.log
                  digest="$(sed -nE 's/.*digest: (sha256:[0-9a-f]{64}).*/\1/p' \
                    /tmp/docker-push.log | tail -n 1)"
                  [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
                  image_ref="$IMAGE_NAME@$digest"
                  docker manifest inspect "$image_ref" >/dev/null
                  printf '%s\n' "$image_ref" > production-image.txt
                  echo "digest=$digest" >> "$GITHUB_OUTPUT"

            - name: Attest published image provenance
              uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
              with:
                  subject-name: ${{ steps.image.outputs.name }}
                  subject-digest: ${{ steps.publish.outputs.digest }}
                  push-to-registry: true

            - name: Attest published image SBOM
              uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
              with:
                  subject-name: ${{ steps.image.outputs.name }}
                  subject-digest: ${{ steps.publish.outputs.digest }}
                  sbom-path: image.spdx.json
                  push-to-registry: true

            - name: Record immutable production image
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: production-image
                  path: production-image.txt
                  if-no-files-found: error
                  retention-days: 7
