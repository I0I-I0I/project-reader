name: Deploy to production

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [master]

permissions:
    actions: read
    contents: read

concurrency:
    group: production
    cancel-in-progress: false

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    authorize:
        name: Authorize immutable production image
        if: >-
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.event == 'push' &&
            github.event.workflow_run.head_branch == 'master' &&
            github.event.workflow_run.head_repository.full_name == github.repository
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        outputs:
            image_ref: ${{ steps.image.outputs.ref }}

        steps:
            - name: Ensure revision is current master tip
              env:
                  GH_TOKEN: ${{ github.token }}
                  RELEASE: ${{ github.event.workflow_run.head_sha }}
              run: |
                  set -euo pipefail
                  current_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/master" --jq '.sha')"
                  if [[ "$current_sha" != "$RELEASE" ]]; then
                    echo "Refusing stale deployment: $RELEASE; current master is $current_sha" >&2
                    exit 1
                  fi

            - name: Download image digest from successful CI run
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  name: production-image
                  path: deployment
                  run-id: ${{ github.event.workflow_run.id }}
                  github-token: ${{ github.token }}

            - name: Validate immutable image reference
              id: image
              run: |
                  set -euo pipefail
                  mapfile -t image_refs < deployment/production-image.txt
                  [[ "${#image_refs[@]}" -eq 1 ]]
                  image_ref="${image_refs[0]}"
                  expected_image="ghcr.io/${GITHUB_REPOSITORY,,}"
                  digest="${image_ref#"$expected_image"@}"
                  if [[ "$image_ref" != "$expected_image@$digest" ]] || \
                    [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                    echo "Unexpected production image reference: $image_ref" >&2
                    exit 1
                  fi
                  echo "ref=$image_ref" >> "$GITHUB_OUTPUT"

    deploy:
        name: Deploy successful master image
        needs: authorize
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        environment:
            name: production
            url: ${{ vars.PRODUCTION_URL }}
        permissions:
            contents: read
            packages: read

        steps:
            - name: Checkout tested revision
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}
                  persist-credentials: false

            - name: Validate production configuration
              env:
                  PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
                  PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
              run: |
                  set -euo pipefail
                  [[ "$PRODUCTION_HOST" =~ ^([a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,63}$ ]]
                  [[ "$PRODUCTION_URL" == "https://$PRODUCTION_HOST" || \
                     "$PRODUCTION_URL" == "https://$PRODUCTION_HOST/" ]]

            - name: Configure SSH
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
                  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
              run: |
                  set -euo pipefail
                  [[ "$DEPLOY_HOST" =~ ^[a-zA-Z0-9.-]+$ ]]
                  [[ "$DEPLOY_USER" =~ ^[a-zA-Z0-9._-]+$ ]]

                  install -m 700 -d ~/.ssh
                  printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
                  chmod 600 ~/.ssh/known_hosts
                  ssh-keygen -F "$DEPLOY_HOST" -f ~/.ssh/known_hosts >/dev/null

                  cat > ~/.ssh/config <<EOF
                  Host production
                    HostName $DEPLOY_HOST
                    User $DEPLOY_USER
                    IdentityFile ~/.ssh/deploy_key
                    IdentitiesOnly yes
                    BatchMode yes
                    StrictHostKeyChecking yes
                    UserKnownHostsFile ~/.ssh/known_hosts
                    ConnectTimeout 15
                    ServerAliveInterval 15
                    ServerAliveCountMax 2
                  EOF
                  chmod 600 ~/.ssh/config
                  ssh production true

            - name: Pull exact image digest on production
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_USER: ${{ github.actor }}
                  IMAGE_REF: ${{ needs.authorize.outputs.image_ref }}
              run: |
                  set -euo pipefail
                  # shellcheck disable=SC2029 # Validated values intentionally expand on the runner.
                  printf '%s' "$GH_TOKEN" | ssh production \
                    "set -euo pipefail
                     docker_config=\$(mktemp -d)
                     trap 'rm -rf \"\$docker_config\"' EXIT
                     export DOCKER_CONFIG=\$docker_config
                     docker login ghcr.io --username '$GH_USER' --password-stdin >/dev/null
                     docker pull '$IMAGE_REF' >/dev/null
                     docker logout ghcr.io >/dev/null"

            - name: Upload immutable release configuration
              env:
                  IMAGE_REF: ${{ needs.authorize.outputs.image_ref }}
                  RELEASE: ${{ github.event.workflow_run.head_sha }}
              run: |
                  set -euo pipefail
                  printf '%s\n' "$IMAGE_REF" > /tmp/image-ref
                  # shellcheck disable=SC2029 # RELEASE is a validated commit SHA.
                  ssh production "RELEASE='$RELEASE' bash -s" <<'REMOTE'
                  set -euo pipefail
                  base=/opt/project-reader/releases
                  incoming="$base/.incoming-$RELEASE"
                  rm -rf "$incoming"
                  install -m 700 -d "$incoming"
                  REMOTE

                  scp -q docker-compose.yml /tmp/image-ref \
                    "production:/opt/project-reader/releases/.incoming-$RELEASE/"

                  # shellcheck disable=SC2029 # RELEASE is a validated commit SHA.
                  ssh production "RELEASE='$RELEASE' bash -s" <<'REMOTE'
                  set -euo pipefail
                  base=/opt/project-reader/releases
                  incoming="$base/.incoming-$RELEASE"
                  final="$base/$RELEASE"
                  if [[ -e "$final" ]]; then
                    cmp "$incoming/docker-compose.yml" "$final/docker-compose.yml"
                    cmp "$incoming/image-ref" "$final/image-ref"
                    rm -rf "$incoming"
                  else
                    chmod 444 "$incoming/docker-compose.yml" "$incoming/image-ref"
                    chmod 555 "$incoming"
                    mv "$incoming" "$final"
                  fi
                  REMOTE

            - name: Ensure revision is still current master tip
              env:
                  GH_TOKEN: ${{ github.token }}
                  RELEASE: ${{ github.event.workflow_run.head_sha }}
              run: |
                  set -euo pipefail
                  current_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/master" --jq '.sha')"
                  test "$current_sha" = "$RELEASE"

            - name: Activate, verify, and finalize exact tested image
              env:
                  IMAGE_REF: ${{ needs.authorize.outputs.image_ref }}
                  PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
                  PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
                  RELEASE: ${{ github.event.workflow_run.head_sha }}
              run: |
                  set -euo pipefail
                  # shellcheck disable=SC2029 # Every interpolated value was strictly validated.
                  ssh production \
                    "IMAGE_REF='$IMAGE_REF' RELEASE='$RELEASE' PRODUCTION_HOST='$PRODUCTION_HOST' PRODUCTION_URL='$PRODUCTION_URL' bash -s" \
                    < scripts/deploy-release.sh

            - name: Remove runner SSH credentials
              if: always()
              run: rm -rf ~/.ssh /tmp/image-ref
